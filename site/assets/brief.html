<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION BRIEF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00cc00;
    --dim-green: #006600;
    --amber: #ccaa00;
    --red: #cc3333;
    --bg: #0d0d0d;
    --panel: #0d0d0d;
    --border: #1f2f1f;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Menlo', 'DejaVu Sans Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-x: hidden;
  }

  #terminal {
    flex: 1;
    padding: 2rem;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* Header bar */
  #header {
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 0.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    margin-bottom: 0;
  }

  #header .title {
    color: var(--green);
    font-size: 12px;
  }

  #header .status {
    font-size: 11px;
    color: var(--dim-green);
  }

  /* Main terminal window */
  #screen {
    border: 1px solid var(--border);
    padding: 1.5rem;
    background: var(--panel);
    min-height: 420px;
    position: relative;
  }

  /* Output lines */
  .line {
    display: block;
    min-height: 1.6em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .line.prompt::before {
    content: '~$ ';
    color: var(--dim-green);
  }

  .line.system {
    color: var(--dim-green);
    font-size: 12px;
  }

  .line.header-line {
    color: var(--amber);
    font-size: 13px;
  }

  .line.alert {
    color: var(--red);
    font-size: 12px;
  }

  .line.blank { min-height: 0.8em; }

  .line.divider {
    color: var(--dim-green);
    font-size: 12px;
  }

  .line.body {
    color: #aaaaaa;
    padding-left: 1rem;
  }

  .line.label {
    color: var(--amber);
    font-size: 12px;
  }

  .line.objective {
    color: var(--green);
    padding-left: 1.5rem;
  }

  .line.objective::before {
    content: '> ';
    color: var(--dim-green);
  }

  /* Blinking cursor */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--green);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }

  /* Progress bar */
  #progress-wrap {
    margin: 0.8rem 0;
    display: none;
  }

  #progress-label {
    font-size: 11px;
    color: var(--dim-green);
    margin-bottom: 4px;
  }

  #progress-bar-outer {
    border: 1px solid var(--border);
    height: 10px;
    width: 100%;
    background: #050505;
  }

  #progress-bar-inner {
    height: 100%;
    background: var(--dim-green);
    width: 0%;
    transition: width 0.05s linear;
  }

  /* Accept button */
  #btn-wrap {
    margin-top: 2rem;
    display: none;
    text-align: left;
  }

  #accept-btn {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Menlo', monospace;
    font-size: 13px;
    background: transparent;
    color: var(--green);
    border: 1px solid var(--dim-green);
    padding: 0.5rem 1.6rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #accept-btn:hover {
    background: var(--dim-green);
    color: #0d0d0d;
  }

  #accept-btn::after {
    content: ' >>>';
  }

  /* Footer */
  #footer {
    border: 1px solid var(--border);
    border-top: none;
    padding: 0.4rem 1rem;
    display: flex;
    justify-content: space-between;
    background: var(--panel);
    font-size: 11px;
    color: var(--dim-green);
  }

  /* Decline / skip link */
  #skip {
    margin-top: 1rem;
    font-size: 11px;
    color: var(--dim-green);
    text-decoration: none;
    display: none;
  }
  #skip:hover { color: var(--green); text-decoration: underline; }

  /* Responsive */
  @media (max-width: 600px) {
    #terminal { padding: 0.8rem; }
    #screen { padding: 1rem; }
    body { font-size: 12px; }
  }
</style>
</head>
<body>

<div id="terminal">
  <div id="header">
    <span class="title" id="org-name">REDBACK SYSTEMS // SOC</span>
    <span class="status" id="clock"></span>
  </div>

  <div id="screen">
    <div id="output"></div>
    <div id="progress-wrap">
      <div id="progress-label">DECRYPTING TRANSMISSION...</div>
      <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
    </div>
    <span id="cursor"></span>

    <div id="btn-wrap">
      <button id="accept-btn" onclick="proceed()">ACCEPT MISSION</button>
      <br>
      <a id="skip" href="#">[ skip briefing ]</a>
    </div>
  </div>

  <div id="footer">
    <span id="footer-left">CLASSIFICATION: TRAINING // AUTHORISED PERSONNEL ONLY</span>
    <span id="footer-right">CERT III CYBER SECURITY</span>
  </div>
</div>

<script>
/* ============================================================
   REDBACK SYSTEMS — TERMINAL MISSION BRIEF
   Usage: brief.html?week=8&title=WiFi+Attack+Lab&ref=RBS-2025-008
          &dest=session-08.html&org=Redback+Systems+%2F%2F+SOC
   
   URL Parameters:
     week    — week number (default: "?")
     title   — mission title (default: "CLASSIFIED")
     ref     — incident reference number
     dest    — URL to navigate to on accept (default: "#")
     org     — org name in header (default: "REDBACK SYSTEMS // SOC")
     objectives — pipe-separated list: "Do+thing+1|Do+thing+2|Do+thing+3"
     body    — mission body text (URL encoded)
     intel   — additional intel line (URL encoded)
   ============================================================ */

const params = new URLSearchParams(window.location.search);

const cfg = {
  week:       params.get('week')       || '?',
  title:      params.get('title')      || 'CLASSIFIED',
  ref:        params.get('ref')        || 'RBS-' + Date.now().toString().slice(-6),
  dest:       params.get('dest')       || '#',
  org:        params.get('org')        || 'REDBACK SYSTEMS // SOC',
  body:       params.get('body')       || 'Incoming classified briefing. Stand by for mission parameters.',
  intel:      params.get('intel')      || '',
  objectives: params.get('objectives') ? params.get('objectives').split('|') : [
    'Complete all lab tasks',
    'Document findings in incident report',
    'Submit evidence to portfolio'
  ]
};

document.getElementById('org-name').textContent = cfg.org;
document.getElementById('accept-btn').onclick = proceed;
document.getElementById('skip').href = cfg.dest;

function proceed() {
  window.location.href = cfg.dest;
}

/* Live clock */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toISOString().replace('T',' ').slice(0,19) + ' AWST';
}
updateClock();
setInterval(updateClock, 1000);

/* ---- TYPING ENGINE ---- */
const output = document.getElementById('output');
let queue = [];
let pos = 0;

function addLine(cls, text, instant) {
  queue.push({ cls, text: text || '', instant: !!instant });
}

function addBlank() { queue.push({ cls: 'blank', text: '', instant: true }); }

/* Build the script */
function buildScript() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  addLine('system',  'REDBACK SYSTEMS SECURE COMMUNICATIONS', true);
  addLine('system',  'Terminal v4.2.1 — Authenticated', true);
  addBlank();
  addLine('prompt',  'connect soc-relay.redback.internal', false);
  addLine('system',  'Establishing encrypted channel...', false);
  addLine('system',  'Connection established. TLS 1.3. Certificate verified.', false);
  addBlank();
  addLine('prompt',  'recv --decrypt --priority HIGH', false);
}

function buildBrief() {
  addLine('system',  'INCOMING TRANSMISSION — DECRYPTING...', false);
  addBlank();
  addLine('divider', '─'.repeat(62), true);
  addLine('header-line', `MISSION BRIEF — WEEK ${cfg.week}: ${cfg.title}`, false);
  addLine('divider', '─'.repeat(62), true);
  addBlank();
  addLine('label',   'REFERENCE  : ' + cfg.ref, false);
  addLine('label',   'DATE       : ' + new Date().toLocaleDateString('en-AU'), false);
  addLine('label',   'CLEARANCE  : TRAINING // LAB ENVIRONMENT', false);
  addBlank();
  addLine('alert',   '[ SITUATION ]', false);
  addLine('body',    cfg.body, false);
  if (cfg.intel) {
    addBlank();
    addLine('alert',   '[ INTEL ]', false);
    addLine('body',    cfg.intel, false);
  }
  addBlank();
  addLine('alert',   '[ OBJECTIVES ]', false);
  cfg.objectives.forEach(obj => addLine('objective', obj, false));
  addBlank();
  addLine('divider', '─'.repeat(62), true);
  addLine('system',  'END OF TRANSMISSION', true);
  addBlank();
}

buildScript();

/* Render a single queued item */
function renderNext() {
  if (pos >= queue.length) {
    showDecrypt();
    return;
  }

  const item = queue[pos];
  pos++;

  const span = document.createElement('span');
  span.className = 'line ' + item.cls;
  output.appendChild(span);

  if (item.instant || item.text === '') {
    span.textContent = item.text;
    scrollBottom();
    setTimeout(renderNext, item.cls === 'blank' ? 80 : 30);
    return;
  }

  typeText(span, item.text, 0, function() {
    scrollBottom();
    const delay = item.cls === 'prompt' ? 400 :
                  item.cls === 'system' ? 200 : 60;
    setTimeout(renderNext, delay);
  });
}

function typeText(el, text, i, done) {
  if (i >= text.length) { done(); return; }
  el.textContent += text[i];
  scrollBottom();
  const speed = text[i] === ' ' ? 18 : 22;
  setTimeout(() => typeText(el, text, i+1, done), speed);
}

function scrollBottom() {
  window.scrollTo(0, document.body.scrollHeight);
}

/* After boot lines — show decrypt progress bar, then brief */
function showDecrypt() {
  const wrap = document.getElementById('progress-wrap');
  const bar  = document.getElementById('progress-bar-inner');
  wrap.style.display = 'block';
  document.getElementById('cursor').style.display = 'none';
  scrollBottom();

  let pct = 0;
  const iv = setInterval(() => {
    pct += Math.random() * 8 + 2;
    if (pct >= 100) {
      pct = 100;
      bar.style.width = pct + '%';
      clearInterval(iv);
      setTimeout(() => {
        wrap.style.display = 'none';
        document.getElementById('cursor').style.display = 'inline-block';
        buildBrief();
        renderBrief();
      }, 400);
    } else {
      bar.style.width = Math.min(pct, 100) + '%';
    }
  }, 80);
}

function renderBrief() {
  renderBriefLine();
}

function renderBriefLine() {
  if (pos >= queue.length) {
    showAccept();
    return;
  }

  const item = queue[pos];
  pos++;

  const span = document.createElement('span');
  span.className = 'line ' + item.cls;
  output.appendChild(span);

  if (item.instant || item.text === '') {
    span.textContent = item.text;
    scrollBottom();
    setTimeout(renderBriefLine, item.cls === 'blank' ? 60 : 15);
    return;
  }

  const speed = (item.cls === 'body' || item.cls === 'objective') ? 12 : 20;
  typeTextFast(span, item.text, 0, speed, function() {
    scrollBottom();
    setTimeout(renderBriefLine, 40);
  });
}

function typeTextFast(el, text, i, speed, done) {
  if (i >= text.length) { done(); return; }
  el.textContent += text[i];
  scrollBottom();
  setTimeout(() => typeTextFast(el, text, i+1, speed, done), speed);
}

function showAccept() {
  const btn = document.getElementById('btn-wrap');
  const skip = document.getElementById('skip');
  btn.style.display = 'block';
  skip.style.display = 'inline';
  scrollBottom();
}

/* Kick off */
setTimeout(renderNext, 600);
</script>
</body>
</html>
