watch:
  - docs

site_name: "REDBACK SYSTEMS // SOC Training"
site_description: "ICTICT213 | ICTSAS214 | ICTSAS305 — Cert III Cyber Security"
site_author: Murray Hay
site_url: https://yoursite.com/cyber-course

repo_name: cyber-course
repo_url: https://github.com/yourusername/cyber-course
edit_uri: edit/main/docs/

copyright: "Copyright &copy; 2025 North Metropolitan TAFE. CLASSIFIED: TRAINING USE ONLY."

theme:
  name: material
  logo: assets/images/redback-logo.png
  favicon: assets/images/redback-favicon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    # Dark mode (default - cyber aesthetic)
    - scheme: slate
      primary: red
      accent: deep-orange
      toggle:
        icon: material/lock
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: red
      accent: deep-orange
      toggle:
        icon: material/lock-open
        name: Switch to dark mode
  font:
    text: Share Tech Mono
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/terminal-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/light-bulb-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/flame-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

plugins:
  - search:
      lang: en
  - mkdocs-video:
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
  - minify:
      minify_html: true
  - iframe:

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
      toc_depth: 2
  - tables
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Situation Report: course-overview/sitrep.md

  - "PHASE 1 — Reconnaissance (Weeks 1-7)":
    - Week 1 - OS Fundamentals & Threat Landscape: sessions/session-01.md
    - Week 2 - OS Deep Dive: sessions/session-02.md
    - Week 3 - Hardware & Physical Security: sessions/session-03.md
    - Week 4 - Forensic Recovery (PC Teardown): sessions/session-04.md
    - Week 5 - Hardened OS Build: sessions/session-05.md
    - Week 6 - Virtualisation & Isolated Environments: sessions/session-06.md
    - Week 7 - ParrotOS & Steganography Lab: sessions/session-07.md

  - "PHASE 2 — Active Threat (Weeks 8-11)":
    - Week 8 - WiFi Attack Lab (Evil Twin): sessions/session-08.md
    - Week 9 - Wireshark & Traffic Analysis: sessions/session-09.md
    - Week 10 - Password Cracking Lab: sessions/session-10.md
    - Week 11 - Metasploitable & Exploitation: sessions/session-11.md

  - "PHASE 3 — Incident Response (Weeks 12-15)":
    - Week 12 - IDS with Snort: sessions/session-12.md
    - Week 13 - SOC Exercise — PCAP Replay: sessions/session-13.md
    - Week 14 - Phishing Kit Lab: sessions/session-14.md
    - Week 15 - Client Advisory & Documentation: sessions/session-15.md

  - "PHASE 4 — Debrief (Weeks 16-18)":
    - Week 16 - Helpdesk Roleplay & Incident Reports: sessions/session-16.md
    - Week 17 - One-on-One Support & Feedback: sessions/session-17.md
    - Week 18 - Portfolio Submission & AAR: sessions/session-18.md

  - Assessments:
    - Overview: assessments/overview.md
    - Practical Portfolio (AT1): assessments/at1-portfolio.md
    - Knowledge Tests: assessments/knowledge-tests.md

  - Resources:
    - Tools & References: resources/tools.md
    - Redback Systems Intranet: resources/intranet.md
    - Glossary: resources/glossary.md

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/prgrobots
