watch:
  - docs

site_name: "REDBACK SYSTEMS // SOC Training"
site_description: "ICTICT213 | ICTSAS214 | ICTSAS305 — Cert III Cyber Security"
site_author: Murray Hay
site_url: https://yoursite.com/cyber-course

repo_name: cyber-course
repo_url: https://github.com/yourusername/cyber-course
edit_uri: edit/main/docs/

copyright: "Copyright &copy; 2025 North Metropolitan TAFE. CLASSIFIED: TRAINING USE ONLY."

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: red
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep-orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search:
      lang: en
  - mkdocs-video:
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
  - minify:
      minify_html: true
  - iframe:

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
      toc_depth: 2
  - tables
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Course Guide: course-overview/sitrep.md
  - Learning & Assessment Plan: course-overview/lap.md
  - Unit Mapping: course-overview/unit-mapping.md
  - Assessments: assessments/overview.md

  - "Weeks 1–7: Foundations":
    - Week 1 — OS & Threat Landscape: sessions/session-01.md
    - Week 2 — OS Deep Dive: sessions/session-02.md
    - Week 3 — Hardware & Physical Security: sessions/session-03.md
    - Week 4 — PC Teardown (Forensic): sessions/session-04.md
    - Week 5 — Hardened OS Build: sessions/session-05.md
    - Week 6 — Virtual Machines: sessions/session-06.md
    - Week 7 — Parrot OS & Steganography: sessions/session-07.md

  - "Weeks 8–11: Attack Labs":
    - Week 8 — Rogue IoT Device: sessions/session-08.md
    - Week 9 — Wireshark & Traffic Analysis: sessions/session-09.md
    - Week 10 — Password Cracking: sessions/session-10.md
    - Week 11 — Exploitation (Metasploitable): sessions/session-11.md

  - "Weeks 12–15: Incident Response":
    - Week 12 — IDS with Snort: sessions/session-12.md
    - Week 13 — SOC PCAP Exercise: sessions/session-13.md
    - Week 14 — Phishing Lab: sessions/session-14.md
    - Week 15 — Client Documentation: sessions/session-15.md

  - "Weeks 16–18: Wrap Up":
    - Week 16 — Helpdesk Roleplay: sessions/session-16.md
    - Week 17 — One-on-One Support: sessions/session-17.md
    - Week 18 — Portfolio & Final Test: sessions/session-18.md

  - Resources:
    - Tools & Commands: resources/tools.md
    - Redback Systems Intranet: resources/intranet.md
    - Glossary: resources/glossary.md

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/prgrobots
